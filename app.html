<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Herramientas</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 100%;
    max-width: 420px;
}

.field { margin-bottom: 12px; }

input, select {
    width: 100%;
    padding: 12px;
}

button {
    width: 100%;
    padding: 14px;
    background: blue;
    color: white;
    border: none;
}

.error { color: red; display: none; }

</style>

</head>

<body>

<div class="container">

<div id="pantallaInfo"></div>

<div id="pantallaFormulario" style="display:none;">

<h2>Movimiento</h2>

<div id="listaHerramientas"></div>

<div class="field">
<label>Origen</label>
<div id="origenAuto"></div>
</div>

<div class="field">
<label>Destino</label>
<select id="destino">
<option value="">Seleccionar</option>
<option>Pañol Intelmec</option>
<option>Obra</option>
<option>REPARACIÓN</option>
</select>
</div>

<div class="field">
<label>Clave</label>
<input id="clave">
</div>

<button onclick="enviar()">Guardar</button>

<div id="mensaje"></div>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxYOgzrNSly5_wR8ULFjx693n9X1J5jA0IEAsCL8YwKSUQhNobvqxXXlhT7J7uzKgVF/exec";
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let ubicacionActual = "";

// LOCAL STORAGE
function obtenerLista() {
    return JSON.parse(localStorage.getItem("herramientas")) || [];
}

function guardarLista(lista) {
    localStorage.setItem("herramientas", JSON.stringify(lista));
}

// FORMATEAR FECHA
function formatearFecha(f) {
    if (!f || f === "-") return "-";
    let d = new Date(f);
    return d.toLocaleString();
}

// CARGAR
async function cargar() {

    const res = await fetch(API_URL + "?id=" + id);
    const data = await res.json();

    ubicacionActual = data.ubicacion;

    let lista = obtenerLista();

    if (!lista.find(h => h.id === data.id)) {
        lista.push({ id: data.id, nombre: data.nombre });
        guardarLista(lista);
    }

    document.getElementById("pantallaInfo").innerHTML = `
        <h2>${data.nombre}</h2>
        <p>${data.ubicacion}</p>
        <p>${data.responsable_actual}</p>
        <p>${formatearFecha(data.fecha)}</p>
        <button onclick="form()">Generar movimiento</button>
    `;
}

// MOSTRAR FORM
function form() {
    document.getElementById("pantallaInfo").style.display = "none";
    document.getElementById("pantallaFormulario").style.display = "block";

    document.getElementById("origenAuto").innerText = ubicacionActual;

    render();
}

// LISTA
function render() {
    let lista = obtenerLista();

    document.getElementById("listaHerramientas").innerHTML =
        lista.map(h => `<div>${h.nombre}</div>`).join("");
}

// ENVIAR
async function enviar() {

    let lista = obtenerLista();

    let data = {
        herramientas: lista,
        origen: ubicacionActual,
        destino: document.getElementById("destino").value,
        clave: document.getElementById("clave").value,
        tipo: "TRASLADO",
        obs: ""
    };

    const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.error) {
        alert(result.error);
        return;
    }

    alert("OK");

    localStorage.removeItem("herramientas");
}

cargar();

</script>

</body>
</html>
