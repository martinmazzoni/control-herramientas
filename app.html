<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Herramientas</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    margin: 0;
}
.container {
    max-width: 420px;
    margin: auto;
    padding: 15px;
}
.header {
    text-align: center;
    margin-bottom: 10px;
}
.header img {
    max-width: 100%;
}
.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
}
button {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    background: #2563eb;
    color: white;
}
button.secondary {
    background: #6b7280;
}
input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}
.lista {
    max-height: 150px;
    overflow-y: auto;
    background: #f1f5f9;
    border-radius: 6px;
    padding: 8px;
}
.item {
    display: flex;
    justify-content: space-between;
    padding: 6px;
    border-bottom: 1px solid #ddd;
}
#reader {
    width: 100%;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <img src="https://i.imgur.com/RWyuyWM.png">
    <h2>CONTROL DE HERRAMIENTAS</h2>
</div>

<div id="pantallaInicio" class="card">Cargando...</div>

<div id="pantallaIndividual" class="card" style="display:none;">
<h3>Carga individual</h3>

<p><b>Origen:</b> <span id="origenInd"></span></p>

<select id="destinoInd" onchange="toggleOtro('Ind')">
<option value="">Destino...</option>
<option>Pañol Intelmec</option>
<option>Pañol Armoy</option>
<option>Porta</option>
<option>Oficina</option>
<option>Coca Cola</option>
<option>REPARACIÓN</option>
<option value="Otro">Otro</option>
</select>

<input id="destinoIndOtro" placeholder="Escribir destino" style="display:none;">
<input type="password" id="claveInd" placeholder="Clave operario">
<input id="obsInd" placeholder="Observaciones">

<button onclick="guardarIndividual()">Guardar</button>
<button class="secondary" onclick="volverInicio()">⬅ Volver</button>

<div id="msgInd"></div>
</div>

<div id="pantallaMultiple" class="card" style="display:none;">
<h3>Escaneo múltiple</h3>

<div id="reader"></div>

<button onclick="iniciarScanner()">▶ Iniciar escaneo</button>
<button onclick="detenerScanner()">⏹ Detener escaneo</button>

<div class="lista" id="lista"></div>

<button onclick="limpiarLista()">Limpiar lista</button>

<hr>

<select id="destinoMul" onchange="toggleOtro('Mul')">
<option value="">Destino...</option>
<option>Pañol Intelmec</option>
<option>Pañol Armoy</option>
<option>Porta</option>
<option>Oficina</option>
<option>Coca Cola</option>
<option>REPARACIÓN</option>
<option value="Otro">Otro</option>
</select>

<input id="destinoMulOtro" placeholder="Escribir destino" style="display:none;">
<input type="password" id="claveMul" placeholder="Clave operario">
<input id="obsMul" placeholder="Observaciones">

<button onclick="guardarMultiple()">Confirmar movimiento</button>
<button class="secondary" onclick="volverInicio()">⬅ Volver</button>

<div id="mensaje"></div>
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxYOgzrNSly5_wR8ULFjx693n9X1J5jA0IEAsCL8YwKSUQhNobvqxXXlhT7J7uzKgVF/exec";

let herramienta = null;
let listaIDs = new Set();
let scanner = null;

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

cargarInicio();

/************* DESTINO *************/
function toggleOtro(tipo){
    const select = document.getElementById("destino"+tipo);
    const input = document.getElementById("destino"+tipo+"Otro");

    if(select.value === "Otro"){
        input.style.display = "block";
    } else {
        input.style.display = "none";
        input.value = "";
    }
}

function getDestino(tipo){
    let destino = document.getElementById("destino"+tipo).value;
    if(destino === "Otro"){
        destino = document.getElementById("destino"+tipo+"Otro").value;
    }
    return destino;
}

/************* CARGA INICIAL *************/
async function cargarInicio() {

    const pantalla = document.getElementById("pantallaInicio");

    if (!id) {
        pantalla.innerText = "❌ QR inválido";
        return;
    }

    try {

        const res = await fetch(API_URL + "?id=" + encodeURIComponent(id));
        const text = await res.text();

        let data;

        try {
            data = JSON.parse(text);
        } catch {
            console.error("Respuesta no JSON:", text);
            throw new Error("Respuesta inválida");
        }

        if (data.error) {
            pantalla.innerText = "❌ No encontrada";
            return;
        }

        herramienta = data;

        pantalla.innerHTML = `
            <h2>${data.nombre}</h2>
            <p><b>Ubicación:</b> ${data.ubicacion}</p>
            <p><b>Responsable:</b> ${data.responsable_actual}</p>
            <p><b>Último:</b> ${formatear(data.fecha)}</p>

            <button onclick="abrirIndividual()">Carga individual</button>
            <button onclick="abrirMultiple()">📦 Carga múltiple</button>
        `;

    } catch (err) {
        pantalla.innerText = "❌ Error de conexión";
        console.error(err);
    }
}

function formatear(f) {
    if (!f || f === "-") return "-";
    return new Date(f).toLocaleString();
}

/************* NAV *************/
function abrirIndividual() {
    toggle("pantallaInicio","pantallaIndividual");
    document.getElementById("origenInd").innerText = herramienta.ubicacion;
}
function abrirMultiple() {
    toggle("pantallaInicio","pantallaMultiple");
}
function volverInicio() {
    detenerScanner();
    toggle("pantallaIndividual","pantallaInicio");
    toggle("pantallaMultiple","pantallaInicio");
}
function toggle(off,on){
    if(document.getElementById(off)) document.getElementById(off).style.display="none";
    document.getElementById(on).style.display="block";
}

/************* INDIVIDUAL *************/
async function guardarIndividual(){

    const destino = getDestino("Ind");
    const clave = document.getElementById("claveInd").value;

    if(!destino || !clave) return alert("Completar datos");

    const data = {
        id: herramienta.id,
        origen: herramienta.ubicacion,
        destino,
        clave,
        tipo: "TRASLADO",
        obs: document.getElementById("obsInd").value
    };

    try {

        const res = await fetch(API_URL,{
            method:"POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const text = await res.text();
        let r;

        try {
            r = JSON.parse(text);
        } catch {
            console.error("Respuesta inválida:", text);
            throw new Error();
        }

        document.getElementById("msgInd").innerText =
            r.error ? "❌ " + r.error : "✅ Guardado";

    } catch {
        document.getElementById("msgInd").innerText = "❌ Error de conexión";
    }
}

/************* SCANNER *************/
function iniciarScanner(){
    if(scanner) return;
    scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" },{ fps: 10, qrbox: 250 },(txt)=>procesarQR(txt));
}
function detenerScanner(){
    if(scanner){
        scanner.stop();
        scanner = null;
    }
}
function procesarQR(txt){
    let valor = txt;
    if(txt.includes("id=")){
        valor = new URL(txt).searchParams.get("id");
    }
    if(!listaIDs.has(valor)){
        listaIDs.add(valor);
        renderLista();
    }
}

/************* LISTA *************/
function renderLista(){
    const cont = document.getElementById("lista");
    cont.innerHTML="";
    listaIDs.forEach(id=>{
        const div=document.createElement("div");
        div.className="item";
        div.innerHTML=`<span>${id}</span><button onclick="eliminar('${id}')">X</button>`;
        cont.appendChild(div);
    });
}
function eliminar(id){
    listaIDs.delete(id);
    renderLista();
}
function limpiarLista(){
    listaIDs.clear();
    renderLista();
}

/************* MULTIPLE *************/
async function guardarMultiple(){

    if(listaIDs.size===0) return alert("Sin herramientas");

    const destino = getDestino("Mul");
    const clave = document.getElementById("claveMul").value;

    if(!destino || !clave) return alert("Completar datos");

    const herramientas = Array.from(listaIDs).map(id=>({id}));

    const data = {
        herramientas,
        origen: herramienta.ubicacion,
        destino,
        clave,
        tipo:"TRASLADO",
        obs: document.getElementById("obsMul").value
    };

    try {

        const res = await fetch(API_URL,{
            method:"POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const text = await res.text();
        let r;

        try {
            r = JSON.parse(text);
        } catch {
            console.error("Respuesta inválida:", text);
            throw new Error();
        }

        document.getElementById("mensaje").innerText =
            r.error ? "❌ " + r.error : "✅ Movimientos registrados";

        limpiarLista();

    } catch {
        document.getElementById("mensaje").innerText = "❌ Error de conexión";
    }
}

</script>

</body>
</html>
