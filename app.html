<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Herramientas</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 10px;
    box-sizing: border-box;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 10px;
}

.field {
    margin-bottom: 12px;
}

input, select {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 16px;
    box-sizing: border-box;
}

.error {
    color: red;
    font-size: 12px;
    display: none;
    margin-top: 4px;
}

button {
    width: 100%;
    padding: 14px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    margin-top: 10px;
    cursor: pointer;
}

#mensaje {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

<!-- 🔹 PANTALLA INFO -->
<div id="pantallaInfo">Cargando...</div>

<!-- 🔹 FORMULARIO -->
<div id="pantallaFormulario" style="display:none;">

<h2>Nuevo Movimiento</h2>

<div class="field">
<label>Origen</label>
<div id="origenAuto" style="padding:12px; background:#f1f5f9; border-radius:6px; font-weight:bold;">
-
</div>
</div>

<div class="field">
<label>Destino</label>
<select id="destino" onchange="toggleOtro('destino')">
<option value="">Seleccionar...</option>
<option>Pañol Intelmec</option>
<option>Pañol Armoy</option>
<option>Porta</option>
<option>Oficina</option>
<option>Coca Cola</option>
<option>REPARACIÓN</option>
<option>Otro</option>
</select>
<input id="destinoOtro" placeholder="Escribir destino" style="display:none; margin-top: 8px;">
<div class="error" id="errorDestino">Campo obligatorio</div>
</div>

<div class="field">
<label>Clave Operario</label>
<input id="clave" maxlength="4">
<div class="error" id="errorClave">Campo obligatorio</div>
</div>

<div class="field">
<label>Observaciones</label>
<input id="obs">
</div>

<button onclick="enviar()" id="btnGuardar">Guardar Movimiento</button>

<div id="mensaje"></div>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxYOgzrNSly5_wR8ULFjx693n9X1J5jA0IEAsCL8YwKSUQhNobvqxXXlhT7J7uzKgVF/exec";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let herramientaData = null;
let ubicacionActual = "";

// 🔹 Mostrar/ocultar "Otro"
function toggleOtro(campo) {
    const select = document.getElementById(campo);
    const input = document.getElementById(campo + "Otro");

    if (select.value === "Otro") {
        input.style.display = "block";
    } else {
        input.style.display = "none";
        input.value = "";
    }
}

// 🔹 Formatear fecha
function formatearFecha(fechaRaw) {

    if (!fechaRaw || fechaRaw === "-") return "-";

    let fecha = new Date(fechaRaw);

    let dia = String(fecha.getDate()).padStart(2, '0');
    let mes = String(fecha.getMonth() + 1).padStart(2, '0');
    let anio = fecha.getFullYear();

    let hora = String(fecha.getHours()).padStart(2, '0');
    let min = String(fecha.getMinutes()).padStart(2, '0');

    return `${dia}/${mes}/${anio} ${hora}:${min}`;
}

// 🔹 Cargar info
async function cargarHerramienta() {

    if (!id) {
        document.getElementById("pantallaInfo").innerText = "QR inválido";
        return;
    }

    try {
        const res = await fetch(API_URL + "?id=" + id);
        const data = await res.json();

        if (data.error) {
            document.getElementById("pantallaInfo").innerText = "No encontrada";
            return;
        }

        herramientaData = data;
        ubicacionActual = data.ubicacion;

        document.getElementById("pantallaInfo").innerHTML = `
            <h2>${data.nombre}</h2>
            <p><b>Ubicación:</b> ${data.ubicacion}</p>
            <p><b>Responsable:</b> ${data.responsable_actual}</p>
            <p><b>Último movimiento:</b> ${formatearFecha(data.fecha)}</p>

            <button onclick="mostrarFormulario()">Generar movimiento</button>
        `;

    } catch (error) {
        document.getElementById("pantallaInfo").innerText = "Error de conexión";
    }
}

// 🔹 Mostrar formulario
function mostrarFormulario() {
    document.getElementById("pantallaInfo").style.display = "none";
    document.getElementById("pantallaFormulario").style.display = "block";

    document.getElementById("origenAuto").innerText = ubicacionActual;
}

// 🔹 Validación
function validar() {

    let valido = true;

    function check(id, errorId) {
        let val = document.getElementById(id).value;
        let error = document.getElementById(errorId);

        if (!val) {
            error.style.display = "block";
            valido = false;
        } else {
            error.style.display = "none";
        }
    }

    check("clave", "errorClave");

    let destino = document.getElementById("destino").value === "Otro"
        ? document.getElementById("destinoOtro").value
        : document.getElementById("destino").value;

    if (!destino) {
        document.getElementById("errorDestino").style.display = "block";
        valido = false;
    } else {
        document.getElementById("errorDestino").style.display = "none";
    }

    return valido;
}

// 🔹 Enviar
async function enviar() {

    const mensaje = document.getElementById("mensaje");
    const boton = document.getElementById("btnGuardar");

    if (!validar()) {
        mensaje.style.color = "red";
        mensaje.innerText = "❗ Completar campos obligatorios";
        return;
    }

    boton.disabled = true;
    boton.innerText = "Guardando...";

    let origen = ubicacionActual;

    let destino = document.getElementById("destino").value === "Otro"
        ? document.getElementById("destinoOtro").value
        : document.getElementById("destino").value;

    // 🔴 Validación extra
    if (origen === destino) {
        mensaje.style.color = "red";
        mensaje.innerText = "❗ Origen y destino no pueden ser iguales";
        boton.disabled = false;
        boton.innerText = "Guardar Movimiento";
        return;
    }

    let data = {
        id: herramientaData.id,
        origen: origen,
        destino: destino,
        clave: document.getElementById("clave").value.trim(),
        tipo: "TRASLADO",
        obs: document.getElementById("obs").value
    };

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (result.error) {
            mensaje.style.color = "red";
            mensaje.innerText = "❌ " + result.error;
            boton.disabled = false;
            boton.innerText = "Guardar Movimiento";
            return;
        }

        mensaje.style.color = "green";
        mensaje.innerText = "✅ Movimiento guardado";

        // limpiar
        document.getElementById("clave").value = "";
        document.getElementById("obs").value = "";
        document.getElementById("destino").selectedIndex = 0;
        document.getElementById("destinoOtro").value = "";
        document.getElementById("destinoOtro").style.display = "none";

    } catch (error) {
        mensaje.style.color = "red";
        mensaje.innerText = "❌ Error al guardar";
    }

    boton.disabled = false;
    boton.innerText = "Guardar Movimiento";
}

// 🔹 INIT
cargarHerramienta();

</script>

</body>
</html>
