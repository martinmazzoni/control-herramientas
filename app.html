<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Herramientas</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 100%;
    max-width: 420px;
}

.field { margin-bottom: 12px; }

input, select {
    width: 100%;
    padding: 12px;
}

button {
    width: 100%;
    padding: 14px;
    background: #2563eb;
    color: white;
    border: none;
}

.error { color: red; display: none; }

#mensaje {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

<div id="pantallaInfo">Cargando herramienta...</div>

<div id="pantallaFormulario" style="display:none;">

<h2>Movimiento</h2>

<div id="listaHerramientas" style="margin-bottom:10px;"></div>

<div class="field">
<label>Origen</label>
<div id="origenAuto" style="padding:10px; background:#f1f5f9;"></div>
</div>

<div class="field">
<label>Destino</label>
<select id="destino">
<option value="">Seleccionar</option>
<option>Pañol Intelmec</option>
<option>Obra</option>
<option>REPARACIÓN</option>
</select>
</div>

<div class="field">
<label>Clave</label>
<input id="clave">
</div>

<button onclick="enviar()" id="btnGuardar">Guardar</button>

<div id="mensaje"></div>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxYOgzrNSly5_wR8ULFjx693n9X1J5jA0IEAsCL8YwKSUQhNobvqxXXlhT7J7uzKgVF/exec";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let ubicacionActual = "";

// 🔹 LOCAL STORAGE
function obtenerLista() {
    return JSON.parse(localStorage.getItem("herramientas")) || [];
}

function guardarLista(lista) {
    localStorage.setItem("herramientas", JSON.stringify(lista));
}

// 🔹 FORMATEAR FECHA
function formatearFecha(f) {
    if (!f || f === "-") return "-";
    let d = new Date(f);
    return d.toLocaleString();
}

// 🔹 CARGAR (CORREGIDO)
async function cargar() {

    const contenedor = document.getElementById("pantallaInfo");

    try {

        if (!id) {
            contenedor.innerText = "QR inválido";
            return;
        }

        const res = await fetch(API_URL + "?id=" + id);

        if (!res.ok) {
            contenedor.innerText = "Error de conexión";
            return;
        }

        const data = await res.json();

        if (data.error) {
            contenedor.innerText = "Herramienta no encontrada";
            return;
        }

        ubicacionActual = data.ubicacion || "Sin movimientos";

        let lista = obtenerLista();

        if (!lista.find(h => h.id === data.id)) {
            lista.push({ id: data.id, nombre: data.nombre });
            guardarLista(lista);
        }

        contenedor.innerHTML = `
            <h2>${data.nombre}</h2>
            <p><b>Ubicación:</b> ${data.ubicacion || "-"}</p>
            <p><b>Responsable:</b> ${data.responsable_actual || "-"}</p>
            <p><b>Último movimiento:</b> ${formatearFecha(data.fecha)}</p>
            <button onclick="form()">Generar movimiento</button>
        `;

    } catch (error) {
        contenedor.innerText = "Error general";
        console.error(error);
    }
}

// 🔹 MOSTRAR FORM
function form() {
    document.getElementById("pantallaInfo").style.display = "none";
    document.getElementById("pantallaFormulario").style.display = "block";

    document.getElementById("origenAuto").innerText = ubicacionActual;

    render();
}

// 🔹 LISTA
function render() {
    let lista = obtenerLista();

    document.getElementById("listaHerramientas").innerHTML =
        lista.map(h => `<div style="padding:6px; border-bottom:1px solid #eee;">${h.nombre}</div>`).join("");
}

// 🔹 ENVIAR
async function enviar() {

    const mensaje = document.getElementById("mensaje");
    const boton = document.getElementById("btnGuardar");

    let lista = obtenerLista();

    if (lista.length === 0) {
        mensaje.style.color = "red";
        mensaje.innerText = "No hay herramientas";
        return;
    }

    let destino = document.getElementById("destino").value;
    let clave = document.getElementById("clave").value;

    if (!destino || !clave) {
        mensaje.style.color = "red";
        mensaje.innerText = "Completar datos";
        return;
    }

    boton.disabled = true;
    boton.innerText = "Guardando...";

    let data = {
        herramientas: lista,
        origen: ubicacionActual,
        destino: destino,
        clave: clave,
        tipo: "TRASLADO",
        obs: ""
    };

    try {

        const res = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (result.error) {
            mensaje.style.color = "red";
            mensaje.innerText = result.error;
            boton.disabled = false;
            boton.innerText = "Guardar";
            return;
        }

        mensaje.style.color = "green";
        mensaje.innerText = "Movimiento guardado";

        localStorage.removeItem("herramientas");
        render();

    } catch (error) {
        mensaje.style.color = "red";
        mensaje.innerText = "Error al guardar";
    }

    boton.disabled = false;
    boton.innerText = "Guardar";
}

// 🔹 INIT
cargar();

</script>

</body>
</html>
