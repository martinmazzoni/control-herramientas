<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registro de Herramientas</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 10px;
    width: 380px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 { text-align: center; }

.field {
    margin-bottom: 12px;
}

input, select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

.error {
    color: red;
    font-size: 12px;
    display: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
}

#mensaje {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

<h2>Movimiento de Herramienta</h2>

<div class="field">
<label>Herramienta</label>
<select id="herramienta"></select>
<div class="error" id="errorHerramienta">Campo obligatorio</div>
</div>

<div class="field">
<label>Modelo / Código</label>
<input id="modelo">
<div class="error" id="errorModelo">Campo obligatorio</div>
</div>

<div class="field">
<label>Origen</label>
<select id="origen" onchange="toggleOtro('origen')">
<option>Pañol Intelmec</option>
<option>Pañol Armoy</option>
<option>Porta</option>
<option>Oficina</option>
<option>Coca Cola</option>
<option>Otro</option>
</select>
<input id="origenOtro" placeholder="Escribir origen" style="display:none">
<div class="error" id="errorOrigen">Campo obligatorio</div>
</div>

<div class="field">
<label>Destino</label>
<select id="destino" onchange="toggleOtro('destino')">
<option>Pañol Intelmec</option>
<option>Porta</option>
<option>Oficina</option>
<option>Coca Cola</option>
<option>Otro</option>
</select>
<input id="destinoOtro" placeholder="Escribir destino" style="display:none">
<div class="error" id="errorDestino">Campo obligatorio</div>
</div>

<div class="field">
<label>Responsable</label>
<input id="responsable">
<div class="error" id="errorResponsable">Campo obligatorio</div>
</div>

<div class="field">
<label>Observaciones</label>
<input id="obs">
</div>

<button onclick="enviar()" id="btnGuardar">Guardar Movimiento</button>

<div id="mensaje"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxYOgzrNSly5_wR8ULFjx693n9X1J5jA0IEAsCL8YwKSUQhNobvqxXXlhT7J7uzKgVF/exec";

// cargar herramientas
let herramientas = [
"Maquina de soldar",
"Amoladora 7\"",
"Amoladora 4\"",
"Taladro Percutor",
"Atornilladora eléctrica",
"Equipo oxicorte",
"Morsa N 6",
"Nivel laser"
];

function cargarHerramientas() {
    let select = document.getElementById("herramienta");
    herramientas.sort();
    herramientas.forEach(h => {
        select.innerHTML += `<option>${h}</option>`;
    });
}

// mostrar "otro"
function toggleOtro(tipo) {
    let select = document.getElementById(tipo);
    let input = document.getElementById(tipo + "Otro");

    if (select.value === "Otro") {
        input.style.display = "block";
    } else {
        input.style.display = "none";
        input.value = "";
    }
}

// validar campos
function validar() {

    let valido = true;

    function check(id, errorId) {
        let val = document.getElementById(id).value;
        let error = document.getElementById(errorId);

        if (!val) {
            error.style.display = "block";
            valido = false;
        } else {
            error.style.display = "none";
        }
    }

    check("herramienta", "errorHerramienta");
    check("modelo", "errorModelo");
    check("responsable", "errorResponsable");

    let origen = document.getElementById("origen").value === "Otro"
        ? document.getElementById("origenOtro").value
        : document.getElementById("origen").value;

    let destino = document.getElementById("destino").value === "Otro"
        ? document.getElementById("destinoOtro").value
        : document.getElementById("destino").value;

    if (!origen) {
        document.getElementById("errorOrigen").style.display = "block";
        valido = false;
    } else {
        document.getElementById("errorOrigen").style.display = "none";
    }

    if (!destino) {
        document.getElementById("errorDestino").style.display = "block";
        valido = false;
    } else {
        document.getElementById("errorDestino").style.display = "none";
    }

    return valido;
}

// enviar
async function enviar() {

    const mensaje = document.getElementById("mensaje");
    const boton = document.getElementById("btnGuardar");

    if (!validar()) {
        mensaje.style.color = "red";
        mensaje.innerText = "❗ Completar campos obligatorios";
        return;
    }

    boton.disabled = true;
    boton.innerText = "Guardando...";

    let origen = document.getElementById("origen").value === "Otro"
        ? document.getElementById("origenOtro").value
        : document.getElementById("origen").value;

    let destino = document.getElementById("destino").value === "Otro"
        ? document.getElementById("destinoOtro").value
        : document.getElementById("destino").value;

    let data = {
        herramienta: document.getElementById("herramienta").value,
        modelo: document.getElementById("modelo").value,
        codigo: document.getElementById("modelo").value,
        origen,
        destino,
        responsable: document.getElementById("responsable").value,
        tipo: "TRASLADO",
        obs: document.getElementById("obs").value
    };

    try {
        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(data)
        });

        mensaje.style.color = "green";
        mensaje.innerText = "✅ Movimiento guardado";

        document.querySelectorAll("input").forEach(i => i.value = "");

    } catch (error) {
        mensaje.style.color = "red";
        mensaje.innerText = "❌ Error al guardar";
    }

    boton.disabled = false;
    boton.innerText = "Guardar Movimiento";
}

// iniciar
cargarHerramientas();

</script>

</body>
</html>
