<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Herramientas</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 10px;
    box-sizing: border-box;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 5px;
}

h3 {
    text-align: center;
    color: gray;
    font-size: 14px;
    margin-bottom: 20px;
}

.field {
    margin-bottom: 12px;
}

input, select {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 16px;
    box-sizing: border-box;
}

.error {
    color: red;
    font-size: 12px;
    display: none;
    margin-top: 4px;
}

button {
    width: 100%;
    padding: 14px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    margin-top: 10px;
    cursor: pointer;
}

#mensaje {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

<h2>Control de Herramientas - INTELMEC</h2>
<h3>Sistema de Trazabilidad</h3>

<div class="field">
<label>Herramienta</label>
<select id="herramienta" onchange="toggleOtro('herramienta')"></select>
<input id="herramientaOtro" placeholder="Escribir nueva herramienta" style="display:none; margin-top: 8px;">
<div class="error" id="errorHerramienta">Campo obligatorio</div>
</div>

<div class="field">
<label>Código</label>
<input id="modelo">
<div class="error" id="errorModelo">Campo obligatorio</div>
</div>

<div class="field">
<label>Origen</label>
<select id="origen" onchange="toggleOtro('origen')">
<option value="">Seleccionar...</option>
<option>Pañol Intelmec</option>
<option>Porta</option>
<option>Oficina</option>
<option>Coca Cola</option>
<option value="Otro">Otro</option>
</select>
<input id="origenOtro" placeholder="Escribir origen" style="display:none; margin-top: 8px;">
<div class="error" id="errorOrigen">Campo obligatorio</div>
</div>

<div class="field">
<label>Destino</label>
<select id="destino" onchange="toggleOtro('destino')">
<option value="">Seleccionar...</option>
<option>Pañol Intelmec</option>
<option>Pañol Armoy</option>
<option>Porta</option>
<option>Oficina</option>
<option>Coca Cola</option>
<option value="Otro">Otro</option>
</select>
<input id="destinoOtro" placeholder="Escribir destino" style="display:none; margin-top: 8px;">
<div class="error" id="errorDestino">Campo obligatorio</div>
</div>

<div class="field">
<label>Responsable</label>
<input id="responsable">
<div class="error" id="errorResponsable">Campo obligatorio</div>
</div>

<div class="field">
<label>Observaciones</label>
<input id="obs">
</div>

<button onclick="enviar()" id="btnGuardar">Guardar Movimiento</button>

<div id="mensaje"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxYOgzrNSly5_wR8ULFjx693n9X1J5jA0IEAsCL8YwKSUQhNobvqxXXlhT7J7uzKgVF/exec";

// 🔹 LEER QR
const params = new URLSearchParams(window.location.search);
const herramientaQR = params.get("herramienta");
const codigoQR = params.get("codigo");

// 🔹 LISTA HERRAMIENTAS
let herramientas = [
"Amoladora 4\"",
"Amoladora 7\"",
"Atornilladora eléctrica",
"Equipo oxicorte",
"Maquina de soldar",
"Morsa N 6",
"Nivel laser",
"Taladro Percutor"
];

function cargarHerramientas() {
    let select = document.getElementById("herramienta");
    select.innerHTML = '<option value="">Seleccionar...</option>';
    
    herramientas.sort();
    herramientas.forEach(h => {
        select.innerHTML += `<option value="${h}">${h}</option>`;
    });
    
    select.innerHTML += '<option value="Otro">Otro</option>';

    // 🔹 Autocompletar desde QR
    if (herramientaQR) {
        if (herramientas.includes(herramientaQR)) {
            select.value = herramientaQR;
        } else {
            select.value = "Otro";
            toggleOtro('herramienta');
            document.getElementById("herramientaOtro").value = herramientaQR;
        }
    }

    if (codigoQR) {
        document.getElementById("modelo").value = codigoQR;
    }
}

// 🔹 Mostrar "Otro"
function toggleOtro(tipo) {
    let select = document.getElementById(tipo);
    let input = document.getElementById(tipo + "Otro");

    if (select.value === "Otro") {
        input.style.display = "block";
    } else {
        input.style.display = "none";
        input.value = "";
    }
}

// 🔹 Validación
function validar() {

    let valido = true;

    function check(id, errorId) {
        let val = document.getElementById(id).value;
        let error = document.getElementById(errorId);

        if (!val) {
            error.style.display = "block";
            valido = false;
        } else {
            error.style.display = "none";
        }
    }

    check("modelo", "errorModelo");
    check("responsable", "errorResponsable");

    let herramienta = document.getElementById("herramienta").value === "Otro"
        ? document.getElementById("herramientaOtro").value
        : document.getElementById("herramienta").value;

    let origen = document.getElementById("origen").value === "Otro"
        ? document.getElementById("origenOtro").value
        : document.getElementById("origen").value;

    let destino = document.getElementById("destino").value === "Otro"
        ? document.getElementById("destinoOtro").value
        : document.getElementById("destino").value;

    if (!herramienta) {
        document.getElementById("errorHerramienta").style.display = "block";
        valido = false;
    } else {
        document.getElementById("errorHerramienta").style.display = "none";
    }

    if (!origen) {
        document.getElementById("errorOrigen").style.display = "block";
        valido = false;
    } else {
        document.getElementById("errorOrigen").style.display = "none";
    }

    if (!destino) {
        document.getElementById("errorDestino").style.display = "block";
        valido = false;
    } else {
        document.getElementById("errorDestino").style.display = "none";
    }

    return valido;
}

// 🔹 Enviar datos
async function enviar() {

    const mensaje = document.getElementById("mensaje");
    const boton = document.getElementById("btnGuardar");

    if (!validar()) {
        mensaje.style.color = "red";
        mensaje.innerText = "❗ Completar campos obligatorios";
        return;
    }

    boton.disabled = true;
    boton.innerText = "Guardando...";

    let herramienta = document.getElementById("herramienta").value === "Otro"
        ? document.getElementById("herramientaOtro").value
        : document.getElementById("herramienta").value;

    let origen = document.getElementById("origen").value === "Otro"
        ? document.getElementById("origenOtro").value
        : document.getElementById("origen").value;

    let destino = document.getElementById("destino").value === "Otro"
        ? document.getElementById("destinoOtro").value
        : document.getElementById("destino").value;

    let data = {
        herramienta: herramienta,
        modelo: document.getElementById("modelo").value,
        codigo: document.getElementById("modelo").value,
        origen: origen,
        destino: destino,
        responsable: document.getElementById("responsable").value,
        tipo: "TRASLADO",
        obs: document.getElementById("obs").value
    };

    try {
        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(data)
        });

        mensaje.style.color = "green";
        mensaje.innerText = "✅ Movimiento guardado";

        document.querySelectorAll("input").forEach(i => i.value = "");
        document.querySelectorAll("select").forEach(s => { s.selectedIndex = 0; toggleOtro(s.id); });

    } catch (error) {
        mensaje.style.color = "red";
        mensaje.innerText = "❌ Error al guardar";
    }

    boton.disabled = false;
    boton.innerText = "Guardar Movimiento";
}

cargarHerramientas();

</script>

</body>
</html>
