<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Herramientas</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 15px;
    border-radius: 10px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    background: #2563eb;
    color: white;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.lista {
    background: #f1f5f9;
    padding: 10px;
    border-radius: 6px;
    max-height: 150px;
    overflow-y: auto;
    margin-top: 10px;
}

.item {
    display: flex;
    justify-content: space-between;
    padding: 6px;
    border-bottom: 1px solid #ddd;
    font-size: 14px;
}

.item button {
    width: auto;
    padding: 4px 8px;
    background: red;
}

#mensaje {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<!-- PANTALLA NORMAL -->
<div id="pantallaNormal">

<div id="pantallaInfo">Cargando...</div>

<button onclick="activarMultiple()">📦 Carga múltiple</button>

</div>

<!-- PANTALLA MULTIPLE -->
<div id="pantallaMultiple" style="display:none;">

<h2>Escaneo múltiple</h2>

<input id="scannerInput" placeholder="Escanear QR..." autofocus>

<div class="lista" id="lista"></div>

<button onclick="limpiarLista()">🧹 Limpiar lista</button>

<hr>

<select id="destino">
<option value="">Destino...</option>
<option>Pañol Intelmec</option>
<option>Pañol Armoy</option>
<option>Porta</option>
<option>Oficina</option>
<option>Coca Cola</option>
<option>REPARACIÓN</option>
</select>

<input id="clave" placeholder="Clave operario">

<input id="obs" placeholder="Observaciones">

<button onclick="enviarMultiple()">✅ Confirmar movimiento</button>

<button onclick="volver()">⬅ Volver</button>

<div id="mensaje"></div>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxYOgzrNSly5_wR8ULFjx693n9X1J5jA0IEAsCL8YwKSUQhNobvqxXXlhT7J7uzKgVF/exec";

let listaIDs = new Set();
let ubicacionActual = "";

/***********************
 * 🔹 MODO NORMAL
 ***********************/
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function cargarHerramienta() {

    if (!id) {
        document.getElementById("pantallaInfo").innerText = "QR inválido";
        return;
    }

    try {
        const res = await fetch(API_URL + "?id=" + id);
        const data = await res.json();

        ubicacionActual = data.ubicacion;

        document.getElementById("pantallaInfo").innerHTML = `
            <h2>${data.nombre}</h2>
            <p><b>Ubicación:</b> ${data.ubicacion}</p>
        `;

    } catch {
        document.getElementById("pantallaInfo").innerText = "Error";
    }
}

/***********************
 * 🔹 MODO MULTIPLE
 ***********************/
function activarMultiple() {
    document.getElementById("pantallaNormal").style.display = "none";
    document.getElementById("pantallaMultiple").style.display = "block";

    setTimeout(() => {
        document.getElementById("scannerInput").focus();
    }, 200);
}

function volver() {
    document.getElementById("pantallaMultiple").style.display = "none";
    document.getElementById("pantallaNormal").style.display = "block";
}

/***********************
 * 🔹 ESCANEO
 ***********************/
document.getElementById("scannerInput").addEventListener("keypress", function(e) {

    if (e.key === "Enter") {

        let valor = e.target.value.trim();

        if (!valor) return;

        // soporta URL tipo ?id=123
        if (valor.includes("id=")) {
            valor = new URL(valor).searchParams.get("id");
        }

        if (!listaIDs.has(valor)) {
            listaIDs.add(valor);
            renderLista();
        }

        e.target.value = "";
    }
});

/***********************
 * 🔹 LISTA
 ***********************/
function renderLista() {

    const cont = document.getElementById("lista");
    cont.innerHTML = "";

    listaIDs.forEach(id => {

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <span>✔ ${id}</span>
            <button onclick="eliminar('${id}')">X</button>
        `;

        cont.appendChild(div);
    });
}

function eliminar(id) {
    listaIDs.delete(id);
    renderLista();
}

function limpiarLista() {
    listaIDs.clear();
    renderLista();
}

/***********************
 * 🔹 ENVÍO
 ***********************/
async function enviarMultiple() {

    const mensaje = document.getElementById("mensaje");

    if (listaIDs.size === 0) {
        mensaje.innerText = "❗ Sin herramientas";
        mensaje.style.color = "red";
        return;
    }

    const destino = document.getElementById("destino").value;
    const clave = document.getElementById("clave").value.trim();

    if (!destino || !clave) {
        mensaje.innerText = "❗ Completar datos";
        mensaje.style.color = "red";
        return;
    }

    const herramientas = Array.from(listaIDs).map(id => ({ id }));

    const data = {
        herramientas: herramientas,
        origen: ubicacionActual || "SIN DEFINIR",
        destino: destino,
        clave: clave,
        tipo: "TRASLADO",
        obs: document.getElementById("obs").value
    };

    try {

        const res = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (result.error) {
            mensaje.innerText = "❌ " + result.error;
            mensaje.style.color = "red";
            return;
        }

        mensaje.innerText = "✅ Movimientos registrados";
        mensaje.style.color = "green";

        limpiarLista();

    } catch {
        mensaje.innerText = "❌ Error";
        mensaje.style.color = "red";
    }
}

/***********************
 * INIT
 ***********************/
cargarHerramienta();

</script>

</body>
</html>
